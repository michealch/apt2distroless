name: Release Please

# Watches main for conventional commits and maintains a Release PR (via
# release-please). When that PR is merged, release-please creates the GitHub
# Release + a vX.Y.Z tag, and — in the SAME workflow run — the jobs below build
# and publish the multi-arch image (GHCR, plus Docker Hub if configured) and
# the release binaries.
#
# Why everything lives here instead of a separate `on: push: tags` release.yml:
# a tag pushed by release-please using GITHUB_TOKEN does NOT trigger other
# workflows (GitHub's anti-recursion rule), so a tag-triggered workflow would
# never fire. Gating these jobs on release-please's `release_created` output
# sidesteps that — this workflow runs on the human merge to main, a normal push.

on:
  push:
    branches: [main]

# Least-privilege default; individual jobs widen as needed.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE:           ghcr.io/michealch/apt2distroless
  IMAGE_DOCKERHUB: michealchoudhary/apt2distroless

jobs:
  # ── Maintain the Release PR / cut the release ─────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Generate release notes with git-cliff ─────────────────────────────────
  changelog:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # git-cliff reads closed PRs to enrich the notes
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags so git-cliff can walk commits

      - name: Generate release notes (latest tag only)
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          # Required for git-cliff's GitHub metadata on a private repo —
          # without it the pulls API returns 403 and git-cliff panics.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # ── Build & push multi-arch release image to GHCR (+ Docker Hub if set) ────
  image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4      # arm64 emulation on amd64 runner
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is an optional mirror. Detect whether its credentials exist so
      # a missing Docker Hub secret can never block the GHCR push.
      - name: Detect Docker Hub credentials
        id: dh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not set — pushing to GHCR only."
          fi

      - name: Log in to Docker Hub
        if: steps.dh.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          # Annotate the image index (manifest list), not just the per-arch
          # manifests, so registries like GHCR show the description for the
          # multi-arch image.
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          # The Docker Hub image line is empty (and ignored) unless creds exist.
          images: |
            ${{ env.IMAGE }}
            ${{ steps.dh.outputs.enabled == 'true' && env.IMAGE_DOCKERHUB || '' }}
          # github.ref is `main` here (not a tag), so feed the version explicitly.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
          # Set description explicitly (so an empty repo "description" can't blank
          # it out) and licenses to the compound SPDX expression that reflects the
          # code actually bundled in the image (project + Go deps + Go runtime).
          labels: |
            org.opencontainers.image.description=Extract a Debian package closure into a distroless container rootfs
            org.opencontainers.image.licenses=MIT AND Apache-2.0 AND BSD-3-Clause

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v7,linux/s390x
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build raw binaries for every supported arch ───────────────────────────
  binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: amd64, platform: linux/amd64 }
          - { name: arm64, platform: linux/arm64 }
          - { name: "386", platform: linux/386 }
          - { name: armv7, platform: linux/arm/v7 }
          - { name: s390x, platform: linux/s390x }
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build binary (${{ matrix.name }})
        uses: docker/build-push-action@v7
        with:
          context: .
          target: bin-export
          platforms: ${{ matrix.platform }}
          outputs: type=local,dest=./bin-${{ matrix.name }}
          build-args: |
            VERSION=${{ needs.release-please.outputs.tag_name }}
            COMMIT=${{ github.sha }}

      - name: Stage binary
        run: |
          mkdir -p bin
          mv bin-${{ matrix.name }}/apt2distroless \
             bin/apt2distroless-linux-${{ matrix.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.name }}
          path: bin/apt2distroless-linux-${{ matrix.name }}

  # ── Collect third-party license notices for the release binaries ──────────
  # The raw binaries (like the image) statically link Apache-2.0 / BSD-3-Clause
  # code, so they must ship those notices. Reuses the Dockerfile's collection
  # logic via the licenses-export stage. Arch-independent → build once.
  licenses:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      - name: Export license bundle
        uses: docker/build-push-action@v7
        with:
          context: .
          target: licenses-export
          outputs: type=local,dest=./license-bundle
          cache-from: type=gha

      - name: Aggregate THIRD_PARTY_LICENSES.txt
        run: |
          {
            echo "apt2distroless — third-party license notices"
            echo
            echo "The distributed binary statically links the components below;"
            echo "each component's full license text follows."
            echo
            find license-bundle/third-party -type f | sort | while read -r f; do
              echo "================================================================"
              printf '%s\n' "$f" | sed -E 's#license-bundle/third-party/##; s#/LICENSE(\.txt)?$##; s#^go-LICENSE$#the Go runtime#'
              echo "================================================================"
              cat "$f"; echo
            done
          } > THIRD_PARTY_LICENSES.txt

      - uses: actions/upload-artifact@v7
        with:
          name: license-notices
          path: |
            THIRD_PARTY_LICENSES.txt
            LICENSE

  # ── Attach notes + binaries to the release-please GitHub Release ───────────
  publish:
    needs: [release-please, changelog, image, binaries, licenses]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      # Pull in every per-arch binary artifact (binary-amd64, binary-386, …).
      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true
          path: bin/

      # License notices that must ship with the binaries (LICENSE + THIRD_PARTY).
      - uses: actions/download-artifact@v8
        with:
          name: license-notices
          path: bin/

      - name: Create checksums
        run: |
          cd bin
          sha256sum apt2distroless-linux-* > SHA256SUMS

      - name: Attach assets to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            bin/apt2distroless-linux-*
            bin/SHA256SUMS
            bin/LICENSE
            bin/THIRD_PARTY_LICENSES.txt
